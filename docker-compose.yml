version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - .:/app
      - ./storage:/app/storage:rw
      - ./bootstrap/cache:/app/bootstrap/cache:rw
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY:-base64:random_key_change_in_production}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
